name: CI/CD



on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: docker.io
  IMAGE_NAME: git_action_py

jobs:
  # ===============================================
  # JOB 1: build — 코드 문법 검사 (Lint / Syntax Check)
  # ===============================================
  build:
    name: Build (Syntax Check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Syntax check (compile)
        run: |
          # 모든 .py 파일을 바이트컴파일하여 문법 오류 검사
          python -m compileall -q .

      - name: Lint with flake8
        run: |
          pip install flake8
          # 치명적 문법 오류(E9), 미정의 이름(F63,F7,F82)만 실패 처리
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ===============================================
  # JOB 2: test — 코드 테스트 (pytest)
  # ===============================================
  test:
    name: Test (pytest)
    needs: build            # build(문법 검사) 성공해야 실행
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest

  # ===============================================
  # JOB 3: publish — Docker 이미지 빌드 & 업로드
  # ===============================================
  publish:
    name: Build & Push Docker image
    needs: test             # test(코드 테스트) 성공해야 실행
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
