name: Python Security & Test CI


on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 깃허브 가상머신에 파이썬 3.10 설치
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # 🌟 캐싱 마법: 두 번째부터는 다운로드 속도가 비약적으로 빨라집니다.

    # 2. requirements.txt에 있는 라이브러리들(보안 도구, 웹 프레임워크 등) 싹 다 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest # 테스트용 도구 강제 추가

    # 3. tests/ 폴더 안의 테스트 코드들 자동 실행
    - name: Run Tests (Pytest)
      run: pytest tests/
